name: Restart

on:
  workflow_dispatch:
    inputs:
      CLUSTER:
        description: 'Tag of the deployer image with the Kubernetes cluster config'
        required: true
        type: string
  workflow_call:
    inputs:
      CLUSTER:
        description: 'Tag of the deployer image with the Kubernetes cluster config'
        required: true
        type: string

jobs:
  restart-playwright:
    runs-on: 'private-2'
    container:
      image: ibn40/deployer:${{ inputs.CLUSTER }}
      options: --user root
    steps:
      - name: Install kubectl if not present
        run: |
          if ! command -v kubectl &> /dev/null; then
            echo "kubectl not found, installing..."
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mv kubectl /usr/local/bin/kubectl
          else
            echo "kubectl already installed: $(kubectl version --client --short)"
          fi

      - name: Restart Playwright UI Deployment
        run: |
          echo "Restarting playwright-ui deployment in playwright-ui namespace..."
          kubectl rollout restart deployment/playwright-ui -n playwright-ui
          kubectl rollout status deployment/playwright-ui -n playwright-ui